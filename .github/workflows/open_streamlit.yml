name: Keep Streamlit Awake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Check Streamlit health
        run: |
          curl \
            --silent \
            --show-error \
            --max-time 60 \
            --output response.txt \
            --write-out "HTTP %{http_code}\n" \
            "https://iavaluechain.streamlit.app/_stcore/health"

          cat response.txt
