name: Keep Streamlit Awake and Check

on:
  schedule:
    # Mantiene la app activa cada 6 horas.
    - cron: "17 */6 * * *"
      timezone: "Europe/Madrid"

    # Además, hace una comprobación diaria con email a las 08:30.
    - cron: "30 8 * * *"
      timezone: "Europe/Madrid"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: Abrir y comprobar dashboard
        id: dashboard_check
        continue-on-error: true
        run: python check_dashboard_browser.py

      - name: Guardar captura en GitHub
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-check-${{ github.run_id }}
          path: dashboard_check.png
          if-no-files-found: warn
          retention-days: 7

      - name: Enviar email diario con captura
        if: >
          always() &&
          (github.event_name == 'workflow_dispatch' ||
           github.event.schedule == '30 8 * * *')
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DASHBOARD_RESULT: ${{ steps.dashboard_check.outcome }}
        run: python send_dashboard_email.py

      - name: Marcar workflow como fallido si el dashboard no abrió
        if: steps.dashboard_check.outcome == 'failure'
        run: |
          echo "El dashboard no cargó correctamente."
          exit 1

