name: Update Company Radar

on:
  workflow_dispatch:

  schedule:
    - cron: "30 7 * * *"
      timezone: "Europe/Madrid"

permissions:
  contents: write

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance openpyxl

      - name: Run company radar
        run: |
          python data_ia_stocks.py

      - name: Upload Excel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: company-radar-output
          path: company_radar_output.xlsx

      - name: Commit updated Excel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add company_radar_output.xlsx
          git diff --cached --quiet || git commit -m "Update company radar data"
          git push
